<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MawnaFy | বিজ্ঞাপন ডিসপ্লে</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000000;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            height: 100vh;
            width: 100vw;
        }

        /* মূল ডিসপ্লে এলাকা - শুধু মিডিয়া */
        #display {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        #mediaContainer {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        #mediaContainer img,
        #mediaContainer video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        /* শুধুমাত্র টাইমার - বড়, সুন্দর, মাঝখানে-ডান দিকে */
        #timer {
            position: fixed;
            top: 30px;
            right: 30px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(20px);
            color: #FFD966;
            font-size: 2.2rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', 'Fira Mono', monospace;
            padding: 12px 28px;
            border-radius: 80px;
            z-index: 100;
            border: 1px solid rgba(255, 215, 0, 0.5);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4), 0 0 15px rgba(255, 215, 0, 0.2);
            letter-spacing: 3px;
            text-shadow: 0 0 8px rgba(0,0,0,0.5);
            min-width: 120px;
            text-align: center;
            backdrop-filter: blur(12px);
        }

        #timer span {
            font-size: 2.2rem;
            font-weight: 800;
            color: #FFE484;
        }

        /* ইউটিউব কন্টেইনার */
        .youtube-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
        }
        .youtube-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* কোন টাইটেল, কাউন্ট, ডিবাগ বার নেই - সম্পূর্ণ লুকানো */
        #adTitle, #statusBar, #debug, .info-panel {
            display: none !important;
        }

        /* ============= অফলাইন স্ক্রিন - ফুল স্ক্রিন জুড়ে বিশাল ============= */
        #offlineScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #0a0f1e 0%, #03060c 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1), visibility 0.5s;
        }

        #offlineScreen.show {
            opacity: 1;
            visibility: visible;
        }

        .offline-content {
            text-align: center;
            color: white;
            padding: 20px;
            width: 100%;
            max-width: 1200px;
            animation: fadeScaleUp 0.7s ease-out;
        }

        @keyframes fadeScaleUp {
            from {
                opacity: 0;
                transform: scale(0.92);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* বড় অ্যানিমেটেড গ্রাফিক্স */
        .cartoon-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto 30px;
            transform: scale(1.2);
        }

        @media (min-width: 1024px) {
            .cartoon-container {
                width: 420px;
                height: 420px;
                transform: scale(1.4);
                margin-bottom: 50px;
            }
        }

        .wifi-signal {
            position: relative;
            width: 180px;
            height: 160px;
            margin: 70px auto;
        }

        .signal-bar {
            position: absolute;
            bottom: 0;
            width: 32px;
            background: linear-gradient(0deg, #3eff9e, #00d4ff);
            border-radius: 20px 20px 8px 8px;
            animation: strongPulse 1.4s infinite ease-in-out;
            box-shadow: 0 0 15px rgba(62, 255, 158, 0.6);
        }
        .signal-bar:nth-child(1) { left: 0; height: 45px; animation-delay: 0s; background: #2ecc71; }
        .signal-bar:nth-child(2) { left: 55px; height: 80px; animation-delay: 0.2s; background: #f1c40f; }
        .signal-bar:nth-child(3) { left: 110px; height: 115px; animation-delay: 0.4s; background: #e67e22; }
        .signal-bar:nth-child(4) { left: 165px; height: 150px; animation-delay: 0.6s; background: #e74c3c; }

        @keyframes strongPulse {
            0%, 100% { transform: scaleY(0.85); opacity: 0.7; }
            50% { transform: scaleY(1.2); opacity: 1; box-shadow: 0 0 25px currentColor; }
        }

        /* স্যাটেলাইট বড় */
        .satellite {
            position: absolute;
            top: -30px;
            right: -20px;
            width: 100px;
            height: 100px;
            animation: orbitGlide 12s linear infinite;
        }
        .satellite::before {
            content: "🛰️";
            font-size: 85px;
            position: absolute;
            filter: drop-shadow(0 0 12px rgba(255,255,200,0.9));
        }
        @keyframes orbitGlide {
            0% { transform: rotate(0deg) translateX(10px) rotate(0deg);}
            100% { transform: rotate(360deg) translateX(10px) rotate(-360deg);}
        }

        /* কোম্পানির নাম - বড় ও আকর্ষণীয় */
        .company-name {
            font-size: 5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #FFFFFF, #FFD966, #FFA559);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 15px;
            letter-spacing: -1px;
            text-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .tagline {
            font-size: 1.8rem;
            font-weight: 500;
            opacity: 0.95;
            margin-bottom: 45px;
            letter-spacing: 1px;
            color: #cce7ff;
        }

        /* কন্ট্যাক্ট বক্স বড় */
        .contact-info {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(20px);
            padding: 35px 30px;
            border-radius: 80px;
            margin-bottom: 40px;
            border: 1px solid rgba(255,255,255,0.3);
            transition: 0.3s;
        }
        .phone {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            letter-spacing: 1.5px;
            background: linear-gradient(120deg, #fff, #ffecb3);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .website a {
            font-size: 2rem;
            color: #ffda7c;
            text-decoration: none;
            font-weight: 600;
            border-bottom: 3px dashed rgba(255,218,124,0.6);
            transition: 0.2s;
        }
        .website a:hover {
            color: white;
            border-bottom-color: white;
        }

        .reconnect-message {
            margin-top: 30px;
        }
        .status-badge {
            display: inline-block;
            padding: 12px 35px;
            border-radius: 60px;
            font-size: 1.3rem;
            font-weight: 700;
            backdrop-filter: blur(8px);
            margin-bottom: 20px;
        }
        .status-badge.offline {
            background: rgba(231, 76, 60, 0.25);
            border: 2px solid #e74c3c;
            color: #ffae9e;
            box-shadow: 0 0 20px rgba(231,76,60,0.3);
        }
        
        .reconnect-message p {
            font-size: 1.5rem;
            font-weight: 500;
            margin-top: 20px;
            line-height: 1.4;
        }
        
        .auto-text {
            margin-top: 20px;
            font-size: 1.2rem;
            opacity: 0.85;
            letter-spacing: 1px;
        }

        /* ফ্লোটিং ডটস - বড় স্ক্রিনে ভিজুয়াল */
        .floating-dots {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            top: 0;
            left: 0;
            pointer-events: none;
        }
        .dot {
            position: absolute;
            width: 12px;
            height: 12px;
            background: rgba(255,215,150,0.5);
            border-radius: 50%;
            animation: driftSlow 18s infinite linear;
        }
        @keyframes driftSlow {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            15% { opacity: 0.7; }
            85% { opacity: 0.7; }
            100% { transform: translateY(-300px) translateX(180px); opacity: 0; }
        }

        /* রেসপনসিভ - মোবাইলে বিশাল টেক্সট */
        @media (max-width: 768px) {
            .company-name { font-size: 3rem; }
            .tagline { font-size: 1.2rem; margin-bottom: 30px; }
            .phone { font-size: 1.8rem; gap: 10px; }
            .website a { font-size: 1.3rem; }
            .reconnect-message p { font-size: 1.1rem; }
            .status-badge { font-size: 1rem; padding: 8px 24px; }
            .cartoon-container { width: 240px; height: 240px; transform: scale(1); margin-bottom: 20px; }
            .signal-bar { width: 22px; }
            .signal-bar:nth-child(1) { left: 0; }
            .signal-bar:nth-child(2) { left: 40px; }
            .signal-bar:nth-child(3) { left: 80px; }
            .signal-bar:nth-child(4) { left: 120px; height: 110px; }
            .satellite::before { font-size: 60px; }
            #timer { font-size: 1.6rem; padding: 8px 20px; top: 20px; right: 20px; }
            #timer span { font-size: 1.6rem; }
        }

        /* ছোট স্ক্রিনে আরও অ্যাডজাস্ট */
        @media (max-width: 480px) {
            .company-name { font-size: 2.4rem; }
            .phone { font-size: 1.4rem; flex-wrap: wrap; }
            .contact-info { padding: 20px 18px; border-radius: 50px; }
            .tagline { font-size: 1rem; }
        }

        /* No Ad মেসেজ স্টাইল */
        #noAd {
            color: rgba(255,255,255,0.6);
            font-size: 1.8rem;
            text-align: center;
            background: rgba(0,0,0,0.5);
            padding: 20px 35px;
            border-radius: 60px;
            backdrop-filter: blur(10px);
            font-weight: 500;
        }
    </style>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>
    <div id="display">
        <div id="mediaContainer">
            <div id="noAd">✨ MawnaFy লোড হচ্ছে...</div>
        </div>
        <!-- শুধুমাত্র টাইমার - বাকি সব UI লুকানো -->
        <div id="timer">⏱️ <span id="timeDisplay">--</span> sec</div>
    </div>

    <!-- অফলাইন স্ক্রিন - ফুলস্ক্রিন বিশাল কন্টেন্ট -->
    <div id="offlineScreen">
        <div class="floating-dots">
            <div class="dot" style="top: 5%; left: 15%; animation-duration: 14s;"></div>
            <div class="dot" style="top: 75%; left: 85%; animation-duration: 19s;"></div>
            <div class="dot" style="top: 45%; left: 30%; animation-duration: 11s;"></div>
            <div class="dot" style="top: 85%; left: 10%; animation-duration: 16s;"></div>
            <div class="dot" style="top: 20%; left: 92%; animation-duration: 13s;"></div>
            <div class="dot" style="top: 60%; left: 70%; animation-duration: 22s;"></div>
        </div>

        <div class="offline-content">
            <div class="cartoon-container">
                <div class="wifi-signal">
                    <div class="signal-bar"></div>
                    <div class="signal-bar"></div>
                    <div class="signal-bar"></div>
                    <div class="signal-bar"></div>
                </div>
                <div class="satellite"></div>
            </div>

            <div class="company-name">MawnaFy</div>
            <div class="tagline">বিজ্ঞাপনে ডিজিটাল বিপ্লব</div>

            <div class="contact-info">
                <div class="phone">
                    📞 01910552523
                </div>
                <div class="website">
                    🌐 <a href="http://ad.mawnafy.com" target="_blank" rel="noopener">ad.mawnafy.com</a>
                </div>
            </div>

            <div class="reconnect-message">
                <div class="status-badge offline">🔴 সংযোগ বিচ্ছিন্ন</div>
                <p>ইন্টারনেট সংযোগ নেই<br>পুনরায় সংযোগের অপেক্ষায়...</p>
                <div class="auto-text">⚡ স্বয়ংক্রিয়ভাবে পুনরায় চালু হবে</div>
            </div>
        </div>
    </div>

    <script>
        // ============= Firebase Config =============
        const firebaseConfig = {
            apiKey: "AIzaSyDJPy5m4Bix3VNtkvN5u5Dbo8T5_mVZnio",
            authDomain: "papercheckbd.firebaseapp.com",
            projectId: "papercheckbd",
            storageBucket: "papercheckbd.firebasestorage.app",
            messagingSenderId: "637931638962",
            appId: "1:637931638962:web:09ec10db52628c3b57f9ab",
            measurementId: "G-DZ77QQD69H"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ============= ভেরিয়েবল =============
        let ads = [];
        let currentIndex = 0;
        let timeInterval = null;
        let player = null;
        let isPlaying = false;
        let retryCount = 0;
        const MAX_RETRY = 3;
        let isOnline = navigator.onLine;
        
        // DOM এলিমেন্টস
        const offlineScreen = document.getElementById('offlineScreen');
        const mediaContainer = document.getElementById('mediaContainer');
        const timeDisplaySpan = document.getElementById('timeDisplay');
        const timerDiv = document.getElementById('timer');

        // সব মিডিয়া বন্ধ
        function stopAllMedia() {
            if (timeInterval) {
                clearInterval(timeInterval);
                timeInterval = null;
            }
            if (player) {
                try { player.destroy(); } catch(e) {}
                player = null;
            }
            if (mediaContainer) {
                const videos = mediaContainer.querySelectorAll('video');
                videos.forEach(v => { try { v.pause(); } catch(e) {} });
            }
            isPlaying = false;
        }

        function stopTimer() {
            if (timeInterval) {
                clearInterval(timeInterval);
                timeInterval = null;
            }
        }

        function startTimer(durationSec) {
            if (!isOnline || durationSec <= 0) return;
            stopTimer();
            let left = Math.floor(durationSec);
            if (timeDisplaySpan) timeDisplaySpan.innerText = left;
            
            timeInterval = setInterval(() => {
                if (!isOnline) {
                    stopTimer();
                    return;
                }
                left--;
                if (timeDisplaySpan) timeDisplaySpan.innerText = left >= 0 ? left : 0;
                if (left <= 0) {
                    stopTimer();
                    nextAd();
                }
            }, 1000);
        }

        // নেটওয়ার্ক স্ট্যাটাস আপডেট
        function updateNetworkStatus() {
            isOnline = navigator.onLine;
            if (isOnline) {
                offlineScreen.classList.remove('show');
                if (timerDiv) timerDiv.style.display = 'flex';
                if (ads.length === 0 || !isPlaying) {
                    loadAdsFromFirestore();
                } else if (ads.length > 0 && !isPlaying) {
                    playCurrentAd();
                } else if (ads.length > 0 && isPlaying && !timeInterval) {
                    // কিছু ক্ষেত্রে টাইমার বন্ধ থাকলে পুনরায় শুরু
                    const currentAd = ads[currentIndex];
                    if (currentAd) playCurrentAd();
                }
            } else {
                offlineScreen.classList.add('show');
                if (timerDiv) timerDiv.style.display = 'none';
                stopAllMedia();
                mediaContainer.innerHTML = '<div id="noAd">🔌 সংযোগ ফিরলে অটো প্লে হবে</div>';
                isPlaying = false;
            }
        }

        // ইউটিউব আইডি
        function getYoutubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function loadYouTubePlayer(videoId, durationSec) {
            if (!isOnline) return;
            const container = document.getElementById('mediaContainer');
            if (!container) return;
            const oldPlayerDiv = document.getElementById('yt-embed-player');
            if (oldPlayerDiv) oldPlayerDiv.remove();
            
            const playerDiv = document.createElement('div');
            playerDiv.id = 'yt-embed-player';
            playerDiv.className = 'youtube-container';
            container.innerHTML = '';
            container.appendChild(playerDiv);
            
            try {
                if (player && typeof player.destroy === 'function') player.destroy();
                player = new YT.Player('yt-embed-player', {
                    videoId: videoId,
                    playerVars: {
                        autoplay: 1,
                        controls: 0,
                        modestbranding: 1,
                        rel: 0,
                        mute: 1,
                        playsinline: 1,
                        disablekb: 1,
                        fs: 0
                    },
                    events: {
                        onReady: (e) => {
                            e.target.playVideo();
                            startTimer(durationSec);
                        },
                        onStateChange: (e) => {
                            if (e.data === YT.PlayerState.ENDED) {
                                stopTimer();
                                nextAd();
                            }
                        },
                        onError: () => {
                            debugWarn('YouTube error');
                            stopTimer();
                            nextAd();
                        }
                    }
                });
            } catch(e) {
                nextAd();
            }
        }

        function debugWarn(msg) {
            console.warn(msg);
        }

        // বর্তমান অ্যাড প্লে (শুধু টাইমার + কন্টেন্ট)
        function playCurrentAd() {
            if (!isOnline || ads.length === 0) return;
            const ad = ads[currentIndex];
            if (!ad) return;
            
            mediaContainer.innerHTML = '';
            isPlaying = true;
            if (timerDiv) timerDiv.style.display = 'flex';
            
            // ফায়ারস্টোর স্ট্যাটাস আপডেট
            db.collection('displayStatus').doc('current').set({
                online: true,
                currentAd: ad.title || 'অ্যাড',
                lastSeen: firebase.firestore.FieldValue.serverTimestamp()
            }).catch(e=>{});
            
            if (ad.type === 'image') {
                const img = document.createElement('img');
                img.src = ad.url;
                img.alt = ad.title || 'বিজ্ঞাপন';
                img.style.objectFit = 'contain';
                img.onload = () => { startTimer(ad.duration || 10); };
                img.onerror = () => { nextAd(); };
                mediaContainer.appendChild(img);
            } 
            else if (ad.type === 'video') {
                const video = document.createElement('video');
                video.src = ad.url;
                video.autoplay = true;
                video.muted = true;
                video.playsInline = true;
                video.style.objectFit = 'contain';
                let videoDuration = ad.duration || 15;
                video.onloadedmetadata = () => {
                    if (video.duration && !isNaN(video.duration) && video.duration > 0) {
                        videoDuration = Math.min(ad.duration, video.duration);
                    }
                    startTimer(videoDuration);
                };
                video.onended = () => { stopTimer(); nextAd(); };
                video.onerror = () => { nextAd(); };
                mediaContainer.appendChild(video);
                video.play().catch(() => { nextAd(); });
            }
            else if (ad.type === 'youtube') {
                const ytId = getYoutubeId(ad.url);
                if (ytId) {
                    if (typeof YT !== 'undefined' && YT.Player) {
                        loadYouTubePlayer(ytId, ad.duration || 15);
                    } else {
                        window.onYouTubeIframeAPIReady = () => loadYouTubePlayer(ytId, ad.duration || 15);
                        if (!document.querySelector('#yt-api-script')) {
                            const tag = document.createElement('script');
                            tag.id = 'yt-api-script';
                            tag.src = 'https://www.youtube.com/iframe_api';
                            document.head.appendChild(tag);
                        }
                    }
                } else {
                    nextAd();
                }
            }
        }

        function nextAd() {
            if (!isOnline) return;
            stopTimer();
            if (player) { try { player.destroy(); } catch(e){} player = null; }
            
            if (ads.length === 0) {
                isPlaying = false;
                mediaContainer.innerHTML = '<div id="noAd">📺 কোনো বিজ্ঞাপন সক্রিয় নেই</div>';
                if (timerDiv) timerDiv.style.display = 'none';
                return;
            }
            
            if (ads.length === 1) currentIndex = 0;
            else currentIndex = (currentIndex + 1) % ads.length;
            
            setTimeout(() => { playCurrentAd(); }, 80);
        }

        // ফায়ারবেস থেকে অ্যাড লোড
        async function loadAdsFromFirestore() {
            if (!isOnline) return;
            try {
                const snapshot = await db.collection('ads').where('active', '==', true).get();
                let adsList = [];
                snapshot.forEach(doc => {
                    adsList.push({ id: doc.id, ...doc.data() });
                });
                adsList.sort((a,b) => (a.order || 0) - (b.order || 0));
                ads = adsList;
                
                if (ads.length > 0) {
                    if (!isPlaying || mediaContainer.innerHTML.includes('কোনো বিজ্ঞাপন') || mediaContainer.innerHTML.includes('লোড হচ্ছে')) {
                        currentIndex = 0;
                        playCurrentAd();
                    } else if (isPlaying && currentIndex >= ads.length) {
                        currentIndex = 0;
                        playCurrentAd();
                    }
                } else {
                    isPlaying = false;
                    mediaContainer.innerHTML = '<div id="noAd">🎯 নতুন বিজ্ঞাপন আসছে</div>';
                    if (timerDiv) timerDiv.style.display = 'none';
                }
                retryCount = 0;
            } catch (error) {
                if (retryCount < MAX_RETRY) {
                    retryCount++;
                    setTimeout(loadAdsFromFirestore, 4000);
                } else {
                    mediaContainer.innerHTML = '<div id="noAd">⚠️ সার্ভার সংযোগ সমস্যা</div>';
                }
            }
        }

        // রিয়েল টাইম লিসেনার
        let unsub = null;
        function subscribeFirestore() {
            if (unsub) unsub();
            unsub = db.collection('ads').where('active', '==', true).onSnapshot(() => {
                if (isOnline) loadAdsFromFirestore();
            }, (err) => {});
        }

        // প্রতি ৫০ সেকেন্ডে স্ট্যাটাস আপডেট
        setInterval(() => {
            if (isOnline && ads.length > 0 && currentIndex < ads.length && ads[currentIndex]) {
                db.collection('displayStatus').doc('current').set({
                    online: true,
                    currentAd: ads[currentIndex].title,
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                }).catch(e=>{});
            } else if(isOnline) {
                db.collection('displayStatus').doc('current').set({ online: true, lastSeen: firebase.firestore.FieldValue.serverTimestamp() }).catch(e=>{});
            }
        }, 50000);
        
        window.addEventListener('online', () => {
            updateNetworkStatus();
            if (ads.length === 0) loadAdsFromFirestore();
            else if (!isPlaying && ads.length) playCurrentAd();
        });
        window.addEventListener('offline', () => updateNetworkStatus());
        
        window.addEventListener('beforeunload', () => {
            if (isOnline) {
                db.collection('displayStatus').doc('current').set({ online: false, lastSeen: firebase.firestore.FieldValue.serverTimestamp() });
            }
        });
        
        function init() {
            updateNetworkStatus();
            if (isOnline) {
                loadAdsFromFirestore();
                subscribeFirestore();
            } else {
                offlineScreen.classList.add('show');
                if (timerDiv) timerDiv.style.display = 'none';
            }
        }
        init();
    </script>
</body>
</html>
